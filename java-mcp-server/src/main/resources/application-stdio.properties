# Activated via --spring.profiles.active=stdio. Disables the web server and
# all console output (banner + logging) so nothing corrupts the MCP stdio
# JSON-RPC stream, and turns on the stdio transport itself.
spring.main.web-application-type=none
spring.main.banner-mode=off
logging.threshold.console=OFF
logging.file.name=./target/fraud-mcp-stdio-server.log

spring.ai.mcp.server.stdio=true
