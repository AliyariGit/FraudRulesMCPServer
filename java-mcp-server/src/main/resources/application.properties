spring.application.name=fraud-mcp-server

spring.datasource.url=jdbc:postgresql://localhost:5433/frauddb
spring.datasource.username=fraud
spring.datasource.password=fraud

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

server.port=8081
server.error.include-message=always

# MCP stdio transport is off by default (web/REST profile); the "stdio"
# profile below flips this on and turns the web server off instead.
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.name=fraud-rules-mcp-server
spring.ai.mcp.server.version=0.0.1
