services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-mcp-postgres-java
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: frauddb
    ports:
      - "5433:5432"
    volumes:
      - fraud_mcp_java_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d frauddb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fraud_mcp_java_pgdata:
